name: Release Web

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-web:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: win
            archive_extension: zip
            bin_suffix: '.exe'
          - platform: ubuntu-22.04
            target: linux
            archive_extension: tar.gz
            bin_suffix: ''
          - platform: macos-latest
            target: macos
            archive_extension: tar.gz
            bin_suffix: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ------------------------------------------------------------------
      # Linux: 只需 libssl-dev（git2/openssl 编译用），不需要 webkit2gtk
      # ------------------------------------------------------------------
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      # ------------------------------------------------------------------
      # 通用: 工具链
      # ------------------------------------------------------------------
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # ------------------------------------------------------------------
      # 编译
      # ------------------------------------------------------------------
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Web (compile + package)
        run: pnpm run package:web

      # ------------------------------------------------------------------
      # 准备分发包
      # ------------------------------------------------------------------
      - name: Prepare archive
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PLATFORM="${{ matrix.target }}"
          ARCH="$(uname -m)"
          if [ "$PLATFORM" = "win" ]; then
            ARCH="x64"
          fi
          ARCHIVE_NAME="polaris-web-${VERSION}-${PLATFORM}-${ARCH}"

          if [ "$PLATFORM" = "win" ]; then
            7z a "${ARCHIVE_NAME}.zip" polaris-web/ > /dev/null
            mv "${ARCHIVE_NAME}.zip" "${ARCHIVE_NAME}.tar.gz" 2>/dev/null || true
            echo "ARCHIVE=${ARCHIVE_NAME}.zip" >> $GITHUB_ENV
            cp "polaris-web/${ARCHIVE_NAME}.zip" "." 2>/dev/null || \
              7z a "${ARCHIVE_NAME}.zip" polaris-web/ > /dev/null
          else
            tar czf "${ARCHIVE_NAME}.tar.gz" polaris-web/
            echo "ARCHIVE=${ARCHIVE_NAME}.tar.gz" >> $GITHUB_ENV
          fi

          echo "Archive: ${ARCHIVE_NAME}"
          ls -lh "${ARCHIVE_NAME}"*

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: polaris-web-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}
          retention-days: 14

      # ------------------------------------------------------------------
      # 生成 Release Notes（与 Release 工作流保持一致格式）
      # ------------------------------------------------------------------
      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PREV_TAG=$(git tag --sort=-creatordate --list "v*.*.*" | grep -v "^${GITHUB_REF_NAME}$" | head -n 1 || true)
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline "${PREV_TAG}..${GITHUB_REF_NAME}")
          else
            COMMITS=$(git log --oneline -30)
          fi

          features=""
          fixes=""
          others=""
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            if echo "$line" | grep -qE "^(feat|feat\(.*\)):"; then
              features="${features}  - ${line}\n"
            elif echo "$line" | grep -qE "^(fix|fix\(.*\)):"; then
              fixes="${fixes}  - ${line}\n"
            elif echo "$line" | grep -qE "^(perf|refactor|docs|chore|revert|style|ci|test|build):"; then
              others="${others}  - ${line}\n"
            else
              others="${others}  - ${line}\n"
            fi
          done <<< "$COMMITS"

          cat > release_notes.md << NOTES_EOF
          # Polaris $VERSION 发布说明

          本次发布包含 Tauri 桌面端 + Web 独立服务双端产物。

          NOTES_EOF

          if [ -n "$features" ]; then
            echo "## 新增功能" >> release_notes.md
            echo "" >> release_notes.md
            echo -e "$features" >> release_notes.md
            echo "" >> release_notes.md
          fi
          if [ -n "$fixes" ]; then
            echo "## 修复问题" >> release_notes.md
            echo "" >> release_notes.md
            echo -e "$fixes" >> release_notes.md
            echo "" >> release_notes.md
          fi
          if [ -n "$others" ]; then
            echo "## 优化与变更" >> release_notes.md
            echo "" >> release_notes.md
            echo -e "$others" >> release_notes.md
            echo "" >> release_notes.md
          fi

          echo "release_body<<EOF" >> $GITHUB_OUTPUT
          cat release_notes.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ------------------------------------------------------------------
      # 发布到 GitHub Releases（合并到桌面端的 Release，而非独立发布）
      # ------------------------------------------------------------------
      - name: Upload Web asset to Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE }}
          tag_name: ${{ github.ref_name }}
          name: 'Polaris ${{ github.ref_name }}'
          body: ${{ steps.notes.outputs.release_body }}
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
