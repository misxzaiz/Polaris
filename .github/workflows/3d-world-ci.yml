name: 3D World · CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  qa-gate:
    name: 质量门禁
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 运行质量门禁
        run: |
          node temp/3d-map/tools/qa-gate.js --ci --json > qa-report.json
        working-directory: ${{ github.workspace }}

      - name: 输出报告
        if: always()
        run: |
          cat qa-report.json
          jq -r '"门禁结果: \(.passed)/\(.total) 通过, \(.failed) 失败"' qa-report.json
        working-directory: ${{ github.workspace }}

      - name: 上传报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-report
          path: qa-report.json
