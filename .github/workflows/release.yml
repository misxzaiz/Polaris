name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: ''
          - platform: ubuntu-22.04
            target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf cmake pkg-config

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm run build

      - name: Create placeholder MCP binaries
        shell: bash
        run: |
          mkdir -p src-tauri/target/release
          if [ "$RUNNER_OS" == "Windows" ]; then
            touch src-tauri/target/release/polaris-todo-mcp.exe
            touch src-tauri/target/release/polaris-requirements-mcp.exe
            touch src-tauri/target/release/polaris-scheduler-mcp.exe
            touch src-tauri/target/release/polaris-computer-mcp.exe
            touch src-tauri/target/release/polaris-prd-preview-mcp.exe
            touch src-tauri/target/release/polaris-ask-mcp.exe
            touch src-tauri/target/release/polaris-browser-mcp.exe
            touch src-tauri/target/release/polaris-agnes-mcp.exe
          else
            touch src-tauri/target/release/polaris-todo-mcp
            touch src-tauri/target/release/polaris-requirements-mcp
            touch src-tauri/target/release/polaris-scheduler-mcp
            touch src-tauri/target/release/polaris-computer-mcp
            touch src-tauri/target/release/polaris-prd-preview-mcp
            touch src-tauri/target/release/polaris-ask-mcp
            touch src-tauri/target/release/polaris-browser-mcp
            touch src-tauri/target/release/polaris-agnes-mcp
            chmod +x src-tauri/target/release/polaris-*
          fi

      - name: Build MCP binaries
        shell: bash
        run: |
          cargo build --manifest-path src-tauri/Cargo.toml --release --bin polaris-todo-mcp --bin polaris-requirements-mcp --bin polaris-scheduler-mcp --bin polaris-computer-mcp --bin polaris-prd-preview-mcp --bin polaris-ask-mcp --bin polaris-browser-mcp --bin polaris-agnes-mcp

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PREV_TAG=$(git tag --sort=-creatordate --list "v*.*.*" | grep -v "^${GITHUB_REF_NAME}$" | head -n 1 || true)
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline "${PREV_TAG}..${GITHUB_REF_NAME}")
          else
            COMMITS=$(git log --oneline -30)
          fi

          features=""
          fixes=""
          others=""
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            # 分类：feat / fix / refactor / docs / chore / perf / ...
            if echo "$line" | grep -qE "^(feat|feat\(.*\)):"; then
              features="${features}  - ${line}\n"
            elif echo "$line" | grep -qE "^(fix|fix\(.*\)):"; then
              fixes="${fixes}  - ${line}\n"
            elif echo "$line" | grep -qE "^(perf|refactor|docs|chore|revert|style|ci|test|build):"; then
              others="${others}  - ${line}\n"
            else
              others="${others}  - ${line}\n"
            fi
          done <<< "$COMMITS"

          cat > release_notes.md << NOTES_EOF
          # Polaris $VERSION 发布说明

          本次发布包含 Tauri 桌面端 + Web 独立服务双端产物。

          NOTES_EOF

          if [ -n "$features" ]; then
            echo "## 新增功能" >> release_notes.md
            echo "" >> release_notes.md
            echo -e "$features" >> release_notes.md
            echo "" >> release_notes.md
          fi
          if [ -n "$fixes" ]; then
            echo "## 修复问题" >> release_notes.md
            echo "" >> release_notes.md
            echo -e "$fixes" >> release_notes.md
            echo "" >> release_notes.md
          fi
          if [ -n "$others" ]; then
            echo "## 优化与变更" >> release_notes.md
            echo "" >> release_notes.md
            echo -e "$others" >> release_notes.md
            echo "" >> release_notes.md
          fi

          echo "release_body<<EOF" >> $GITHUB_OUTPUT
          cat release_notes.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Polaris ${{ github.ref_name }}'
          releaseBody: ${{ steps.notes.outputs.release_body }}
          releaseDraft: false
          prerelease: false
